<section class="card p-4">
    <div class="flex gap-2">
      <input
        class="input flex-1"
        placeholder="What needs to be done?"
        [ngModel]="newTitle()"
        (ngModelChange)="newTitle.set($event)"
        (keyup.enter)="onEnter()"
        aria-label="New todo" />
      
      <button
        class="btn btn-primary"
        [disabled]="!newTitle() || newTitle().trim().length === 0"
        (click)="add()">
        Add
      </button>
    </div>
  </section>
