<div class="mx-auto">
  <header class="flex items-center justify-between pb-6 border-b" style="border-color: var(--border)">
    <div class="flex items-center gap-3">
      <h1 class="text-2xl font-bold tracking-tight" style="color: var(--text)">{{ title }}</h1>
    </div>

    <div class="flex items-center gap-4">
      <button 
        (click)="toggleDarkMode()"
        class="btn btn-ghost border"
        style="border-color: var(--border)"
        [title]="themeService.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
        
        @if (themeService.isDark()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        }
      </button>

      <button 
        (click)="onLogout()"
        class="btn group relative border hover:bg-rose-500/10 hover:text-rose-500 transition-all"
        style="border-color: var(--border); color: var(--muted)"
        title="Logout">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>
        </svg>
      </button>
    </div>
  </header>
</div>
