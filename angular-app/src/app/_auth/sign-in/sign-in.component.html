<div 
  class="card p-8 w-full box-border shadow-xl flex flex-col h-full" 
  style="background: var(--panel); border-color: var(--border);"
>
  
  <h2 class="text-center text-2xl font-bold mb-6" style="color: var(--text)">Login</h2>

  @if (store.error()) {
    <div class="fail-alert p-3 rounded-lg mb-4 text-center text-sm">
      {{ store.error() }}
    </div>
  }

  <form [formGroup]="signInForm" (ngSubmit)="submitForm()" class="flex flex-col gap-5 flex-1">
    
    <div class="form-group flex flex-col gap-2">
      <label class="text-sm font-medium" style="color: var(--muted)">Email</label>
      <input 
        type="email" 
        formControlName="email" 
        placeholder="your@email.com"
        class="input">
    </div>

    <div class="form-group flex flex-col gap-2">
      <label class="text-sm font-medium" style="color: var(--muted)">Password</label>
      <input 
        type="password" 
        formControlName="password" 
        placeholder="********"
        class="input">
    </div>

    <button 
      type="submit" 
      [disabled]="signInForm.invalid || store.loading()"
      class="btn btn-primary w-full mt-2 py-3">
      
      @if (store.loading()) {
        <span class="flex items-center justify-center gap-2">
          Loading...
        </span>
      } @else {
        Sign in
      }
    </button>

    <div class="text-center mt-auto pt-4 border-t" style="border-color: var(--border)">
      <span class="text-sm" style="color: var(--muted)">Not registered yet? </span>
      <button 
        type="button"
        (click)="onToggleFlip($event)"
        class="text-sm text-indigo-500 hover:text-indigo-400 font-semibold transition-colors focus:outline-none">
        Sign Up
      </button>
    </div>

  </form>
</div>
