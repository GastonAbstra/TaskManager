<div class="card p-8 w-full box-border shadow-xl flex flex-col h-full" style="background: var(--panel); border-color: var(--border);">
  
  <h2 class="text-center text-2xl font-bold mb-6" style="color: var(--text)">Create Account</h2>

  <form [formGroup]="signUpForm" (ngSubmit)="submitForm()" class="flex flex-col gap-5 flex-1">

    <div class="form-group flex flex-col gap-2">
      <label class="text-sm font-medium" style="color: var(--muted)">Email</label>
      <input 
        type="email" 
        formControlName="email" 
        placeholder="your@email.com"
        class="input">
    </div>

    <div class="form-group flex flex-col gap-2">
      <label class="text-sm font-medium" style="color: var(--muted)">Password</label>
      <input 
        type="password" 
        formControlName="password" 
        placeholder="6 characters minimun"
        class="input">
    </div>

    <!-- <div class="form-group flex flex-col gap-2">
      <input 
        type="password" 
        formControlName="password" 
        placeholder="Confirm your password"
        class="input">
    </div> -->

    <button 
      type="submit" 
      [disabled]="signUpForm.invalid"
      class="btn w-full mt-2 py-3 bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-500/20">
      Sign Up
    </button>

    <div class="text-center mt-auto pt-4 border-t" style="border-color: var(--border)">
      <span class="text-sm" style="color: var(--muted)">Have an account already? </span>
      <button 
        type="button"
        (click)="onToggleFlip($event)"
        class="text-sm text-indigo-500 hover:text-indigo-400 font-semibold transition-colors focus:outline-none">
        Sign in
      </button>
    </div>

  </form>
</div>
